[vscode]
# Extensions listed here will be automatically installed into all non-Default profiles.
common_extensions = [
  "blueglassblock.better-json5", # JSON5 language server
  "editorconfig.editorconfig", # EditorConfig support, see https://editorconfig.org/
  "hverlin.mise-vscode", # Env vars, local tools, tasks all-in-one
  "jimeh.actionlint", # GitHub Actions linter
  "mechatroner.rainbow-csv", # Improves CSV viewing
  "oderwat.indent-rainbow", # Improves indent visibility
  "owenlamont.ryl", # YAML linter/formatter
  "redhat.vscode-yaml", # Core YAML support
  "rvben.rumdl", # Markdown linter/formatter
  "tekumara.typos-vscode", # Intelligent spell checker
  "tombi-toml.tombi", # TOML linter/formatter
]

[[vscode.profiles]]
name = "Default"
settings_file = "default_profile_settings.json"
extensions = [
  "bardleware.sandstorm",
]

[[vscode.profiles]]
name = "Nix"
settings_file = "nix_profile_settings.json"
extensions = [
  "jnoortheen.nix-ide", # Nix language server
  "ms-vscode-remote.remote-containers", # Devcontainer support
]

[[vscode.profiles]]
name = "Code"
icon = "code"
settings_file = "code_profile_settings.json"
extensions = [
  "casualjim.gotemplate",
  "charliermarsh.ruff",
  "golang.go",
  "hashicorp.terraform",
  "mk12.better-git-line-blame",
  "ms-azure-devops.azure-pipelines",
  "ms-azuretools.vscode-containers",
  "ms-kubernetes-tools.vscode-kubernetes-tools",
  "ms-python.debugpy",
  "ms-python.python",
  "ms-python.vscode-pylance",
  "ms-python.vscode-python-envs",
  "ms-vscode-remote.remote-ssh",
  "ms-vscode-remote.remote-ssh-edit",
  "ms-vscode-remote.remote-wsl",
  "ms-vscode.powershell",
  "ms-vscode.remote-explorer",
  "njpwerner.autodocstring",
  "ritwickdey.liveserver",
  "rust-lang.rust-analyzer",
  "samuelcolvin.jinjahtml",
  "signageos.signageos-vscode-sops",
]

[[vscode.profiles]]
name = "Text Editing"
icon = "record-keys"
settings_file = "text-editing_profile_settings.json"
extensions = [
  "bluebrown.yamlfmt",
  "davidanson.vscode-markdownlint",
  "kuscamara.yamllint-fix",
  "robbowen.synthwave-vscode",
  "tamasfe.even-better-toml",
]

[[vscode.profiles]]
name = "Work"
icon = "briefcase"
settings_file = "work_profile_settings.json"
extensions = [
  "astral-sh.ty",
  "bluebrown.yamlfmt",
  "casualjim.gotemplate",
  "charliermarsh.ruff",
  "christian-kohler.path-intellisense",
  "esbenp.prettier-vscode",
  "github.github-vscode-theme",
  "hashicorp.terraform",
  "mk12.better-git-line-blame",
  "ms-azure-devops.azure-pipelines",
  "ms-azuretools.vscode-containers",
  "ms-dotnettools.vscode-dotnet-runtime",
  "ms-kubernetes-tools.vscode-kubernetes-tools",
  "ms-mssql.data-workspace-vscode",
  "ms-mssql.mssql",
  "ms-mssql.sql-bindings-vscode",
  "ms-mssql.sql-database-projects-vscode",
  "ms-python.debugpy",
  "ms-python.python",
  "ms-python.vscode-pylance",
  "ms-python.vscode-python-envs",
  "ms-vscode-remote.remote-containers",
  "ms-vscode-remote.remote-wsl",
  "ms-vscode.powershell",
  "njpwerner.autodocstring",
  "samuelcolvin.jinjahtml",
]
